<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VASCONCELOS PET SHOP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body { background-color: #0b0e14; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .hidden { display: none; }
        
        /* LOGO ESTILO PREMIUM */
        .logo-text { font-size: 32px; font-weight: 900; letter-spacing: -1px; text-shadow: 0 0 20px rgba(59, 130, 246, 0.6); }
        .logo-sub { letter-spacing: 6px; font-size: 10px; color: #3b82f6; font-weight: bold; border-top: 1px solid #3b82f6; }

        /* CARROSSEL CUSTOM */
        .carousel-container { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; gap: 15px; padding: 10px 20px; scrollbar-width: none; }
        .carousel-container::-webkit-scrollbar { display: none; }
        
        .product-card { 
            min-width: 160px; max-width: 160px; background: #1a1f29; border-radius: 18px; 
            border: 2px solid transparent; transition: 0.3s; scroll-snap-align: start; position: relative;
        }
        /* MARCAÇÃO DE TOQUE */
        .product-card.selected { border-color: #3b82f6; box-shadow: 0 0 15px rgba(59, 130, 246, 0.4); transform: scale(1.02); }

        .img-box { width: 100%; height: 140px; background: white; border-radius: 14px; overflow: hidden; display: flex; align-items: center; justify-content: center; padding: 10px; }
        .img-box img { max-width: 100%; max-height: 100%; object-fit: contain; }

        /* CARRINHO */
        .cart-btn { position: fixed; bottom: 25px; right: 20px; background: #3b82f6; width: 65px; height: 65px; border-radius: 20px; display: flex; align-items: center; justify-content: center; z-index: 100; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        .section-title { padding-left: 20px; font-size: 14px; font-weight: bold; color: #64748b; text-transform: uppercase; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="app" class="max-w-md mx-auto min-h-screen pb-32">
        
        <header class="text-center py-10">
            <h1 class="logo-text">VASCONCELOS</h1>
            <span class="logo-sub">PET SHOP</span>
        </header>

        <!-- TELA LOGIN/CADASTRO -->
        <section id="auth-screen" class="p-8">
            <div class="space-y-4">
                <input type="email" placeholder="E-mail" class="w-full bg-gray-900 border border-gray-800 p-4 rounded-xl outline-none focus:border-blue-500">
                <input type="password" placeholder="Senha" class="w-full bg-gray-900 border border-gray-800 p-4 rounded-xl outline-none focus:border-blue-500">
                <button onclick="navigate('store')" class="w-full bg-blue-600 p-4 rounded-xl font-black text-lg">ENTRAR</button>
                <div class="flex justify-between text-xs text-gray-500 font-bold px-2">
                    <span>CRIAR CONTA</span>
                    <span>ESQUECI A SENHA</span>
                </div>
            </div>
        </section>

        <!-- TELA DA LOJA (COM 3 CARROSSÉIS) -->
        <section id="store-screen" class="hidden">
            
            <h2 class="section-title">🔥 Destaques da Semana</h2>
            <div class="carousel-container" id="carousel-highlights"></div>

            <h2 class="section-title">🐕 Linha Cães (Seca e Sachê)</h2>
            <div class="carousel-container" id="carousel-dogs"></div>

            <h2 class="section-title">🐈 Linha Gatos (Seca e Sachê)</h2>
            <div class="carousel-container" id="carousel-cats"></div>

        </section>

        <!-- TELA DE DETALHES -->
        <section id="details-screen" class="hidden p-6">
            <button onclick="goBack()" class="bg-gray-800 px-4 py-2 rounded-lg text-xs font-bold mb-6">← VOLTAR (HISTÓRICO)</button>
            <div id="product-detail"></div>
        </section>

    </div>

    <!-- BOTÃO CARRINHO -->
    <div id="main-cart" class="cart-btn hidden" onclick="alert('Indo para o pagamento...')">
        <i class="fas fa-shopping-basket text-2xl"></i>
        <span id="count" class="absolute -top-2 -right-2 bg-red-600 text-[10px] w-6 h-6 rounded-full flex items-center justify-center font-bold">0</span>
    </div>

    <script>
        const history = ['auth'];
        let cartCount = 0;

        // BANCO DE DADOS MASSIVO (SIMULADO)
        const products = [
            // DESTAQUES
            { id: 1, row: 'highlights', tag: 'DOG', brand: 'Royal Canin', name: 'Medium Adult', price: '215,90', img: 'https://images.tcdn.com.br/img/img_prod/697931/racao_royal_canin_medium_adult_para_caes_adultos_de_porte_medio_1127_1_20201111161747.jpg', desc: 'Ração super premium para cães de porte médio.' },
            { id: 2, row: 'highlights', tag: 'CAT', brand: 'Royal Canin', name: 'Kitten Gatos', price: '184,00', img: 'https://images.tcdn.com.br/img/img_prod/697931/racao_royal_canin_kitten_para_gatos_filhotes_de_4_a_12_meses_de_idade_1045_1_20201111161730.jpg', desc: 'Saúde digestiva para filhotes.' },
            
            // CÃES
            { id: 3, row: 'dogs', tag: 'DOG', brand: 'Premier', name: 'Raças Específicas', price: '169,00', img: 'https://images.tcdn.com.br/img/img_prod/697931/racao_premier_pet_racas_especificas_shih_tzu_caes_adultos_477_1_20201111161642.jpg', desc: 'Nutrição para o seu pet de raça.' },
            { id: 4, row: 'dogs', tag: 'DOG', brand: 'Golden', name: 'Special Cães', price: '125,90', img: 'https://images.tcdn.com.br/img/img_prod/697931/racao_golden_special_para_caes_adultos_sabor_frango_e_carne_437_1_20201111161634.jpg', desc: 'Melhor custo benefício premium.' },
            { id: 5, row: 'dogs', tag: 'DOG', brand: 'Pedigree', name: 'Sachê Carne', price: '3,80', img: 'https://static.petz.com.br/fotos/1658428285901.jpg', desc: 'Refeição úmida completa.' },
            { id: 6, row: 'dogs', tag: 'DOG', brand: 'Biofresh', name: 'Castrados', price: '240,00', img: 'https://images.tcdn.com.br/img/img_prod/697931/racao_biofresh_para_caes_adultos_de_racas_pequenas_e_minis_957_1_20201111161718.jpg', desc: 'Livre de grãos, 100% natural.' },
            
            // GATOS
            { id: 7, row: 'cats', tag: 'CAT', brand: 'Whiskas', name: 'Sachê Peixe', price: '4,20', img: 'https://static.petz.com.br/fotos/1660742130325.jpg', desc: 'O favorito dos felinos.' },
            { id: 8, row: 'cats', tag: 'CAT', brand: 'Special Cat', name: 'Mix Sabores', price: '98,00', img: 'https://images.tcdn.com.br/img/img_prod/697931/racao_special_cat_premium_carne_para_gatos_adultos_1013_1_20201111161726.jpg', desc: 'Proteína de alta qualidade.' },
            { id: 9, row: 'cats', tag: 'CAT', brand: 'Cat Chow', name: 'Defesa Plus', price: '115,00', img: 'https://static.petz.com.br/fotos/1625854897457.jpg', desc: 'Proteção para gatos de casa.' },
            { id: 10, row: 'cats', tag: 'CAT', brand: 'N&D', name: 'Grain Free', price: '210,00', img: 'https://images.tcdn.com.br/img/img_prod/697931/racao_n_d_prime_frango_e_granada_para_gatos_adultos_castrados_1019_1_20201111161727.jpg', desc: 'A melhor nutrição do mundo.' }
        ];

        function renderStore() {
            const containers = {
                highlights: document.getElementById('carousel-highlights'),
                dogs: document.getElementById('carousel-dogs'),
                cats: document.getElementById('carousel-cats')
            };

            products.forEach(p => {
                const card = document.createElement('div');
                card.className = 'product-card p-3';
                card.id = `prod-${p.id}`;
                card.innerHTML = `
                    <div class="img-box" onclick="selectProduct(${p.id})">
                        <img src="${p.img}" onerror="this.src='https://via.placeholder.com/150?text=Pet+Food'">
                    </div>
                    <div class="mt-3">
                        <p class="text-[10px] text-blue-500 font-bold uppercase">${p.brand}</p>
                        <h3 class="text-xs font-bold truncate text-gray-200">${p.name}</h3>
                        <p class="text-blue-400 font-black mt-1">R$ ${p.price}</p>
                        <button onclick="addToCart(${p.id})" class="w-full bg-blue-600/20 text-blue-400 text-[10px] py-2 mt-2 rounded-lg font-bold">+ CARRINHO</button>
                    </div>
                `;
                containers[p.row].appendChild(card);
            });
        }

        function selectProduct(id) {
            // Remove marcação de todos
            document.querySelectorAll('.product-card').forEach(c => c.classList.remove('selected'));
            // Adiciona no clicado
            document.getElementById(`prod-${id}`).classList.add('selected');
            
            // Abre detalhes após meio segundo
            setTimeout(() => {
                showDetails(id);
            }, 300);
        }

        function showDetails(id) {
            const p = products.find(x => x.id === id);
            const detailView = document.getElementById('product-detail');
            detailView.innerHTML = `
                <div class="bg-white rounded-3xl p-6 mb-6">
                    <img src="${p.img}" class="w-full h-48 object-contain">
                </div>
                <p class="text-blue-500 font-bold">${p.brand}</p>
                <h1 class="text-2xl font-black mb-2">${p.name}</h1>
                <p class="text-3xl font-black text-blue-400 mb-6">R$ ${p.price}</p>
                <div class="bg-gray-900 p-4 rounded-2xl border border-gray-800">
                    <h4 class="text-xs text-gray-500 font-bold mb-2">DESCRIÇÃO COMPLETA</h4>
                    <p class="text-sm text-gray-400 leading-relaxed">${p.desc}</p>
                </div>
                <button onclick="addToCart(${p.id})" class="w-full bg-blue-600 p-5 rounded-2xl font-black mt-8 shadow-lg shadow-blue-900/20">ADICIONAR AO CARRINHO</button>
            `;
            navigate('details');
        }

        function navigate(screen) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById(screen + '-screen').classList.remove('hidden');
            if(history[history.length-1] !== screen) history.push(screen);
            
            document.getElementById('main-cart').classList.toggle('hidden', screen === 'auth');
            window.scrollTo(0,0);
        }

        function goBack() {
            if(history.length > 1) {
                history.pop();
                const prev = history[history.length-1];
                navigate(prev);
                history.pop(); // Evita duplicar no histórico ao voltar
            }
        }

        function addToCart(id) {
            cartCount++;
            document.getElementById('count').innerText = cartCount;
            // Feedback visual no botão
            const btn = document.getElementById('main-cart');
            btn.classList.add('scale-110');
            setTimeout(() => btn.classList.remove('scale-110'), 200);
        }

        // Inicializar
        renderStore();
    </script>
</body>
</html>
