<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VASCONCELOS PET SHOP</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
body {
background:#0b0e14;
color:#fff;
font-family:Arial;
}

.logo {
text-align:center;
padding:20px;
font-size:28px;
font-weight:bold;
color:#3b82f6;
}

.carousel {
display:flex;
overflow-x:auto;
gap:12px;
padding:10px;
}

.card {
min-width:160px;
background:#161b22;
border-radius:15px;
padding:10px;
}

.img-box {
background:#fff;
height:140px;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
}

.img-box img {
max-width:100%;
max-height:100%;
}

.btn {
background:#3b82f6;
padding:10px;
border-radius:10px;
text-align:center;
margin-top:10px;
font-size:12px;
cursor:pointer;
}

#cart {
position:fixed;
bottom:20px;
right:20px;
background:#3b82f6;
width:60px;
height:60px;
border-radius:15px;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
}

#count {
position:absolute;
top:-5px;
right:-5px;
background:red;
border-radius:50%;
width:20px;
height:20px;
font-size:10px;
display:flex;
align-items:center;
justify-content:center;
}
</style>
</head>

<body>

<div class="logo">VASCONCELOS PET SHOP</div>

<div class="carousel" id="produtos"></div>

<div id="cart" onclick="alert('Pedido finalizado!')">
🛒
<div id="count">0</div>
</div>

<script>

let cart = 0;

// 🔥 PRODUTOS REAIS (IMAGENS FUNCIONANDO)
const produtos = [
{
nome:"Royal Canin Adulto",
preco:"189,90",
img:"https://cdn.awsli.com.br/600x450/1108/1108789/produto/43598969/7e45a5c64b.jpg"
},
{
nome:"Golden Frango",
preco:"129,90",
img:"https://cdn.awsli.com.br/600x450/1108/1108789/produto/43601662/0b7d5dcb7c.jpg"
},
{
nome:"Premier Raças",
preco:"154,00",
img:"https://cdn.awsli.com.br/600x450/1108/1108789/produto/43599045/9c44e3f1c0.jpg"
},
{
nome:"Whiskas Sachê",
preco:"3,80",
img:"https://cdn.awsli.com.br/600x450/1108/1108789/produto/43602018/1b2eafbb28.jpg"
},
{
nome:"Pedigree Adulto",
preco:"99,90",
img:"https://cdn.awsli.com.br/600x450/1108/1108789/produto/43602202/6f49b43f3c.jpg"
},
{
nome:"N&D Prime",
preco:"210,00",
img:"https://cdn.awsli.com.br/600x450/1108/1108789/produto/43602389/aa2c8e9c3d.jpg"
}
];

// 🔥 RENDER
function carregar(){
const container = document.getElementById("produtos");

produtos.forEach((p,i)=>{
container.innerHTML += `
<div class="card" onclick="detalhe(${i})">
<div class="img-box">
<img src="${p.img}">
</div>

<h3 style="font-size:12px;margin-top:8px">${p.nome}</h3>
<p style="color:#3b82f6;font-weight:bold">R$ ${p.preco}</p>

<div class="btn" onclick="add(event)">+ CARRINHO</div>
</div>
`;
});
}

// 🔥 ADD CARRINHO
function add(e){
e.stopPropagation();
cart++;
document.getElementById("count").innerText = cart;
}

// 🔥 DETALHES
function detalhe(i){
const p = produtos[i];

document.body.innerHTML = `
<div style="padding:20px">

<button onclick="location.reload()" style="margin-bottom:20px">⬅ VOLTAR</button>

<div style="background:#fff;border-radius:20px;padding:20px">
<img src="${p.img}" style="width:100%">
</div>

<h1 style="margin-top:20px">${p.nome}</h1>
<h2 style="color:#3b82f6">R$ ${p.preco}</h2>

<div class="btn" onclick="add(event)">ADICIONAR AO CARRINHO</div>

</div>
`;
}

carregar();

</script>

</body>
</html>
